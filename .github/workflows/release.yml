name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.tool.name }} (${{ matrix.os.label }})
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - { runner: ubuntu-latest, label: linux-x86_64, ext: "" }
          - { runner: windows-latest, label: windows-x86_64, ext: ".exe" }
          - { runner: macos-latest, label: macos-arm64, ext: "" }
        tool:
          # script  — entry point to freeze
          # name    — base name of the produced executable
          # extras  — pyproject optional-dependency group to install for the build
          - { script: parse.py, name: dynon-efis-d100-parser, extras: "" }
          - { script: charts.py, name: dynon-efis-d100-charts, extras: "charts" }

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        shell: bash
        run: |
          pip install pyinstaller
          if [ -n "${{ matrix.tool.extras }}" ]; then
            pip install ".[${{ matrix.tool.extras }}]"
          fi

      - name: Build executable
        run: pyinstaller --onefile --name "${{ matrix.tool.name }}" "${{ matrix.tool.script }}"

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          asset="${{ matrix.tool.name }}-${{ github.ref_name }}-${{ matrix.os.label }}${{ matrix.os.ext }}"
          cp "dist/${{ matrix.tool.name }}${{ matrix.os.ext }}" "staging/${asset}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/${{ matrix.tool.name }}-${{ github.ref_name }}-${{ matrix.os.label }}${{ matrix.os.ext }}
          fail_on_unmatched_files: true
